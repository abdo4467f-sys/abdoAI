<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abdo AI</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #311042 100%);
            height: 100dvh;
        }
        body.light-mode {
            background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%);
        }
        /* Liquid Glass Effects */
        .liquid-glass {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .light-mode .liquid-glass {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }
        .liquid-glass-input {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .light-mode .liquid-glass-input {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }
        /* Floating Background Orbs for Deep Liquid Effect */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: 0;
            pointer-events: none;
            opacity: 0.5;
            animation: floatOrb 12s infinite alternate ease-in-out;
        }
        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 50px) scale(1.2); }
        }
        /* Hide Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="w-full flex justify-center items-center relative text-white transition-colors duration-300">

    <div class="orb w-72 h-72 bg-purple-600 top-10 left-5"></div>
    <div class="orb w-80 h-80 bg-cyan-600 bottom-10 right-5" style="animation-delay: -4s;"></div>

    <div class="w-full h-[100dvh] max-w-md flex flex-col justify-between relative z-10 sm:p-4">
        
        <header class="w-full p-4 flex justify-between items-center liquid-glass sm:rounded-t-2xl">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-purple-500 to-cyan-500 flex items-center justify-center shadow-lg">
                    <i class="fa-solid fa-wand-magic-sparkles text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-lg font-bold tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-300 id-app-title">Abdo AI</h1>
                    <p class="text-xs text-emerald-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> متصل وجاهز</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button id="themeToggle" class="w-9 h-9 rounded-lg flex items-center justify-center liquid-glass-input text-slate-300 active:scale-95 transition-transform">
                    <i class="fa-solid fa-moon text-sm" id="themeIcon"></i>
                </button>
                <button id="clearChat" class="w-9 h-9 rounded-lg flex items-center justify-center liquid-glass-input text-rose-400 active:scale-95 transition-transform">
                    <i class="fa-solid fa-trash-can text-sm"></i>
                </button>
            </div>
        </header>

        <main class="flex-1 w-full overflow-y-auto p-4 no-scrollbar flex flex-col gap-4 relative" id="chatContainer">
            
            <div id="welcomeScreen" class="my-auto flex flex-col items-center text-center p-4">
                <div class="w-20 h-20 rounded-2xl bg-gradient-to-tr from-purple-600 to-cyan-500 flex items-center justify-center shadow-2xl mb-6 animate-bounce">
                    <i class="fa-solid fa-robot text-white text-4xl"></i>
                </div>
                <h2 class="text-2xl font-bold mb-2 text-white id-welcome-text">مرحباً بك في Abdo AI</h2>
                <p class="text-sm text-slate-400 mb-8 max-w-xs">مساعدك الذكي فائق السرعة. اسألني عن أي شيء وسأجيبك فوراً.</p>
                
                <div class="w-full grid grid-cols-1 gap-3">
                    <button onclick="useSuggestion('اكتب لي كود صفحة هبوط بسيطة بلغة HTML و CSS')" class="w-full p-3 rounded-xl text-right text-sm liquid-glass text-slate-300 hover:bg-white/5 active:scale-98 transition-all flex items-center justify-between">
                        <span>اكتب كود صفحة هبوط بسيطة</span>
                        <i class="fa-solid fa-code text-cyan-400 text-xs"></i>
                    </button>
                    <button onclick="useSuggestion('كيف يمكنني تنظيم جدول دراسي مكثف للامتحانات؟')" class="w-full p-3 rounded-xl text-right text-sm liquid-glass text-slate-300 hover:bg-white/5 active:scale-98 transition-all flex items-center justify-between">
                        <span>تنظيم جدول دراسي مكثف</span>
                        <i class="fa-solid fa-graduation-cap text-purple-400 text-xs"></i>
                    </button>
                    <button onclick="useSuggestion('لخص لي أساسيات ومفاهيم الذكاء الاصطناعي في نقاط')" class="w-full p-3 rounded-xl text-right text-sm liquid-glass text-slate-300 hover:bg-white/5 active:scale-98 transition-all flex items-center justify-between">
                        <span>تلخيص أساسيات الذكاء الاصطناعي</span>
                        <i class="fa-solid fa-book-open text-emerald-400 text-xs"></i>
                    </button>
                </div>
            </div>

            <div id="messageStream" class="w-full flex flex-col gap-4 hidden"></div>

            <div id="typingIndicator" class="w-full flex justify-start hidden">
                <div class="max-w-[85%] p-3 rounded-2xl liquid-glass rounded-br-none flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 0ms"></span>
                    <span class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 150ms"></span>
                    <span class="w-2 h-2 rounded-full bg-slate-400 animate-bounce" style="animation-delay: 300ms"></span>
                </div>
            </div>
        </main>

        <footer class="w-full p-4 liquid-glass sm:rounded-b-2xl border-t border-white/5">
            <div class="w-full flex items-center gap-2 bg-black/20 light-mode:bg-white/50 p-2 rounded-xl border border-white/10">
                <textarea id="userInput" rows="1" placeholder="اكتب رسالتك هنا..." class="flex-1 bg-transparent border-none outline-none text-sm px-2 text-white light-mode:text-slate-800 resize-none max-h-24 no-scrollbar" style="line-height: 1.5rem;"></textarea>
                <button id="sendBtn" class="w-10 h-10 rounded-lg bg-gradient-to-tr from-purple-600 to-cyan-500 text-white flex items-center justify-center shadow-md active:scale-90 transition-transform">
                    <i class="fa-solid fa-paper-plane transform rotate-180 text-sm"></i>
                </button>
            </div>
        </footer>

    </div>

    <script>
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const clearChat = document.getElementById('clearChat');
        const chatContainer = document.getElementById('chatContainer');
        const welcomeScreen = document.getElementById('welcomeScreen');
        const messageStream = document.getElementById('messageStream');
        const typingIndicator = document.getElementById('typingIndicator');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        let conversationHistory = [];

        // Auto-resize input height
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Theme Toggle Logic
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            themeIcon.className = isLight ? "fa-solid fa-sun text-amber-500 text-sm" : "fa-solid fa-moon text-slate-300 text-sm";
            
            // Adjust light mode text coloring explicitly
            document.querySelectorAll('.id-app-title, .id-welcome-text').forEach(el => {
                if (isLight) el.classList.add('text-slate-800'); else el.classList.remove('text-slate-800');
            });
        });

        // Clear Chat Logic
        clearChat.addEventListener('click', () => {
            conversationHistory = [];
            messageStream.innerHTML = '';
            messageStream.classList.add('hidden');
            welcomeScreen.classList.remove('hidden');
        });

        // Suggestion Chips Handler
        function useSuggestion(text) {
            userInput.value = text;
            sendMessage();
        }

        // Send Message Trigger
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Main Send Function
        async function sendMessage() {
            const query = userInput.value.trim();
            if (!query) return;

            // Reset input UI
            userInput.value = '';
            userInput.style.height = 'auto';

            // Transition UI from Welcome Screen to Active Chat
            if (!welcomeScreen.classList.contains('hidden')) {
                welcomeScreen.classList.add('hidden');
                messageStream.classList.remove('hidden');
            }

            // Append User Bubble
            appendMessageBubble(query, 'user');
            conversationHistory.push({ role: 'user', content: query });
            
            // Show Typing Indicator & Scroll Down
            typingIndicator.classList.remove('hidden');
            scrollToBottom();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ messages: conversationHistory })
                });

                const data = await response.json();
                typingIndicator.classList.add('hidden');

                if (response.ok && data.choices && data.choices[0].message) {
                    const reply = data.choices[0].message.content;
                    appendMessageBubble(reply, 'assistant');
                    conversationHistory.push({ role: 'assistant', content: reply });
                } else {
                    appendMessageBubble('عذراً، واجهت مشكلة في الاتصال بالخادم الداخلي. تأكد من إعداد المفتاح السري بشكل صحيح.', 'assistant', true);
                }
            } catch (err) {
                typingIndicator.classList.add('hidden');
                appendMessageBubble('خطأ غير متوقع: تعذر إرسال الرسالة بنجاح.', 'assistant', true);
            }

            scrollToBottom();
        }

        // Create and Append Chat Bubble
        function appendMessageBubble(text, sender, isError = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `w-full flex ${sender === 'user' ? 'justify-end' : 'justify-start'} animate-fade-in`;

            const bubble = document.createElement('div');
            bubble.className = `max-w-[85%] p-3.5 rounded-2xl text-sm leading-relaxed relative group transition-all duration-200 ${
                sender === 'user' 
                ? 'bg-gradient-to-tr from-purple-600 to-indigo-600 text-white rounded-bl-none shadow-md' 
                : isError 
                  ? 'bg-rose-950/40 text-rose-300 border border-rose-800/40 rounded-br-none'
                  : 'liquid-glass text-slate-100 light-mode:text-slate-800 rounded-br-none'
            }`;

            // Clean format formatting for multiline/code responses
            const formattedText = text.replace(/\n/g, '<br>').replace(/```([\s\S]*?)```/g, '<pre class="bg-black/30 p-2 rounded-lg my-2 font-mono overflow-x-auto text-xs">$1</pre>');
            bubble.innerHTML = `<div>${formattedText}</div>`;

            // Action overlay layout for quick utility actions (e.g., Copy)
            if (sender === 'assistant' && !isError) {
                const copyBtn = document.createElement('button');
                copyBtn.className = "absolute -top-3 left-2 w-7 h-7 rounded-md bg-slate-800/80 text-slate-300 flex items-center justify-center opacity-0 group-hover:opacity-100 active:scale-90 transition-opacity shadow-sm";
                copyBtn.innerHTML = '<i class="fa-regular fa-copy text-xs"></i>';
                copyBtn.onclick = () => {
                    navigator.clipboard.writeText(text);
                    copyBtn.innerHTML = '<i class="fa-solid fa-check text-xs text-emerald-400"></i>';
                    setTimeout(() => copyBtn.innerHTML = '<i class="fa-regular fa-copy text-xs"></i>', 2000);
                };
                bubble.appendChild(copyBtn);
            }

            wrapper.appendChild(bubble);
            messageStream.appendChild(wrapper);
        }

        // Scroll helper function
        function scrollToBottom() {
            chatContainer.scrollTo({
                top: chatContainer.scrollHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>
</html>
